name: Runtime smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: runtime-smoke

      - name: Install tmux 3.7b
        env:
          TMUX_VERSION: 3.7b
          TMUX_SHA256: 87f2e99e3b685973f2ca002ffd6ed7e51a5744f7009daae5a15670b6d532db96
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes bison build-essential libevent-dev libncurses-dev pkg-config
          archive="$RUNNER_TEMP/tmux-$TMUX_VERSION.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/tmux/tmux/releases/download/$TMUX_VERSION/tmux-$TMUX_VERSION.tar.gz" \
            --output "$archive"
          echo "$TMUX_SHA256  $archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/tmux-$TMUX_VERSION"
          ./configure --prefix="$RUNNER_TEMP/tmux"
          make --jobs="$(nproc)"
          make install
          echo "$RUNNER_TEMP/tmux/bin" >> "$GITHUB_PATH"

      - name: Verify tmux version and run ignored redraw probes
        run: |
          test "$(tmux -V)" = "tmux 3.7b"
          cargo test --locked -- --ignored

      - name: Run isolated runtime smoke
        run: scripts/smoke-m6-runtime.sh
